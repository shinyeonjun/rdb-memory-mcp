name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt --target x86_64-pc-windows-msvc

      - name: Verify release tag matches crate version
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $versions = @($metadata.packages | Where-Object { $_.name -like "database-memory-*" } | Select-Object -ExpandProperty version -Unique)
          if ($versions.Count -ne 1 -or $env:GITHUB_REF_NAME -ne "v$($versions[0])") {
            throw "Release tag '$env:GITHUB_REF_NAME' does not match one shared crate version: $($versions -join ', ')"
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked --workspace

      - name: Build release binaries
        run: cargo build --locked --release

      - name: Package and verify metadata-only release
        shell: pwsh
        run: .\scripts\package-release.ps1

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/rdb-memory-mcp-windows-amd64.zip dist/checksums.txt --clobber
          } else {
            gh release create $tag dist/rdb-memory-mcp-windows-amd64.zip dist/checksums.txt --verify-tag --generate-notes --title $tag
          }
