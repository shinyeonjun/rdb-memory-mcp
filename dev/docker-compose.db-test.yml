services:
  postgres:
    image: postgres:16-alpine
    container_name: dbmcp-postgres
    environment:
      POSTGRES_USER: dbmcp
      POSTGRES_PASSWORD: dbmcp
      POSTGRES_DB: dbmcp
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbmcp -d dbmcp"]
      interval: 2s
      timeout: 3s
      retries: 30

  postgres14:
    image: postgres:14-alpine
    container_name: dbmcp-postgres14
    environment:
      POSTGRES_USER: dbmcp
      POSTGRES_PASSWORD: dbmcp
      POSTGRES_DB: dbmcp
